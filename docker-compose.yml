version: '3.9'

services:
  db:
    image: postgres:16
    container_name: django_postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hoopandgo
      POSTGRES_USER: hoopandgo_user
      POSTGRES_PASSWORD: 12345
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_sqlite_app
    command: python3 manage.py runserver 0.0.0.0:8080
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DEV_MODE=False
      - DEBUG=False
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
