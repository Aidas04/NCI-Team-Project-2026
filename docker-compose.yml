services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hoop_and_go
    entrypoint: ["/app/entrypoint.sh"]
    command: ["gunicorn", "hoop_and_go.wsgi:application", "--bind", "0.0.0.0:8080"]
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DEV_MODE=False
      - DEBUG=False
    volumes:
      - .:/app
    working_dir: /app
    restart: unless-stopped
