version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: django_sqlite_app
    command: python3 manage.py runserver 0.0.0.0:8080
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DEV_MODE=True
      - DEBUG=True
    volumes:
      - .:/app
      - ./db.sqlite3:/app/db.sqlite3
    working_dir: /app
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local
