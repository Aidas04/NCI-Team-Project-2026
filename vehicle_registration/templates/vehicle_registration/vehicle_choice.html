<!-- Vehicle registration page, where the user can opt if he wants to register vehicle or no. -->

{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <div class="card shadow p-4 text-center">
        <h2> Do you have a vehicle?</h2>

        <p class="mt-3">
            If you have a vehicle, you can register it for car park.
            Otherwise, you can continue and join the event without registering one.
        </p>
        
        <div class="mt-4">
            <a href="{% url 'vehicle_registration' %}?event_id={{ event_id }}"
                class="btn btn-primary">
                Yes, register my vehicle
            </a>
            <a href="{% url 'continue_booking' event_id %}"
                class="btn btn-secondary">
                No, continue without vehicle
            </a>
        </div>
    </div>
</div>

{% endblock %}
