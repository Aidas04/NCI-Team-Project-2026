{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow p-4 text-center">
        <h2 class="text-success">Payment Successful!</h2>
        <p class="mt-3">
            Your booking for <strong>{{ booking.event.title }}</strong> on
            {{ booking.event.date }} at {{ booking.event.start_time }} is confirmed.
        </p>
        <a href="{% url 'events' %}" class="btn btn-primary mt-3">Back to Events</a>
    </div>
</div>
{% endblock %}
